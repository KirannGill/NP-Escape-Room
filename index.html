        body {
            font-family: 'Inter', sans-serif;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .main-container {
            width: 100%;
            max-width: 900px;
            background-color: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease-in-out;
            min-height: 80vh;
        }
        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
                border-radius: 1rem;
            }
        }
        .code-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 320px;
            background-color: #1f2937;
            color: #d1d5db;
            padding: 2rem;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .code-panel.open {
            transform: translateX(0);
        }
        .code-input-group input {
            text-transform: uppercase;
            width: 40px;
            height: 40px;
            text-align: center;
            font-weight: bold;
            background-color: #374151;
            color: #d1d5db;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .code-input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5);
            outline: none;
        }
        .code-input-group input.correct {
            background-color: #10b981;
            border-color: #059669;
        }
        .code-input-group input.incorrect {
            background-color: #ef4444;
            border-color: #dc2626;
        }
        .drag-item {
            border: 2px solid transparent;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .drag-item.is-dragging {
            opacity: 0.5;
            transform: scale(1.05);
        }
        .drop-target {
            min-height: 150px;
            border: 2px dashed #9ca3af;
            transition: all 0.2s;
        }
        .drop-target.hovered {
            border-color: #4b5563;
            background-color: #e5e7eb;
        }
        .drag-item.correct {
            border-color: #10b981;
        }
        .drag-item.incorrect {
            border-color: #ef4444;

                    <h2 class="text-2xl font-bold text-gray-800">${step.title} - ${step.parts.part2.title}</h2>
                    <p class="text-lg text-gray-700">${step.parts.part2.description}</p>
                    
                    <div class="bg-white p-6 rounded-lg shadow-md mt-4">
                        <div class="text-sm text-gray-500 mb-2">Question ${currentQuestion + 1} of ${step.parts.part2.questions.length}</div>
                        <h3 class="text-xl font-bold mb-4 text-gray-800">${question.question}</h3>
                        
                        <div class="flex gap-4 items-center">
                            <input type="text" id="answer-input" class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type your answer...">
                            <button id="submit-answer" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold shadow-md hover:bg-blue-700 transition-colors">
                                Submit
                            </button>
                        </div>
                        
                        <div id="answer-feedback" class="mt-4 text-center font-semibold"></div>
                        <div id="answer-hint" class="mt-2 text-sm text-gray-500 text-center hidden">${question.hint}</div>
                        
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-sm text-gray-600">Progress: ${currentQuestion}/${step.parts.part2.questions.length}</span>
                            <button id="skip-question" class="px-4 py-2 bg-gray-500 text-white rounded-lg font-semibold hover:bg-gray-600 transition-colors">
                                Skip
                            </button>
                        </div>
                    </div>
                </section>
            `;

            const answerInput = document.getElementById('answer-input');
            const submitButton = document.getElementById('submit-answer');
            const feedbackDiv = document.getElementById('answer-feedback');
            const hintDiv = document.getElementById('answer-hint');
            const skipButton = document.getElementById('skip-question');

            submitButton.onclick = checkAnswer;
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAnswer();
            });

            skipButton.onclick = () => {
                currentQuestion++;
                renderQuestion();
            };

            function checkAnswer() {
                const userAnswer = answerInput.value.trim().toLowerCase();
                const correctAnswer = question.answer.toLowerCase();
                attempts[currentQuestion]++;

                if (userAnswer === correctAnswer) {
                    feedbackDiv.textContent = 'Correct!';
                    feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                    setTimeout(() => {
                        currentQuestion++;
                        renderQuestion();
                    }, 1000);
                } else {
                    feedbackDiv.textContent = 'Incorrect. Try again!';
                    feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                    hintDiv.classList.remove('hidden');
                }
                answerInput.focus();
            }

            answerInput.focus();
        }

        renderQuestion();
    }

    function renderPart3() {
        let currentQuestion = 0;

        function renderQuestion() {
            if (currentQuestion >= step.parts.part3.questions.length) {
                checkActivity3Completion();
                return;
            }

            const question = step.parts.part3.questions[currentQuestion];
            const isAttempted = part3Attempted[currentQuestion];
            
            contentArea.innerHTML = `
                <section class="flex flex-col gap-4 max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold text-gray-800">${step.title} - ${step.parts.part3.title}</h2>
                    <p class="text-lg text-gray-700">${step.parts.part3.description}</p>
                    
                    <div class="bg-white p-6 rounded-lg shadow-md mt-4">
                        <div class="text-sm text-gray-500 mb-2">Question ${currentQuestion + 1} of ${step.parts.part3.questions.length}</div>
                        <h3 class="text-xl font-bold mb-6 text-gray-800">${question.question}</h3>
                        
                        <div class="flex gap-4 justify-center mb-6">
                            <button id="true-btn" class="px-8 py-4 bg-green-500 text-white rounded-lg font-semibold shadow-md hover:bg-green-600 transition-colors ${isAttempted ? 'opacity-50 cursor-not-allowed' : ''}" ${isAttempted ? 'disabled' : ''}>
                                True
                            </button>
                            <button id="false-btn" class="px-8 py-4 bg-red-500 text-white rounded-lg font-semibold shadow-md hover:bg-red-600 transition-colors ${isAttempted ? 'opacity-50 cursor-not-allowed' : ''}" ${isAttempted ? 'disabled' : ''}>
                                False
                            </button>
                        </div>
                        
                        <div id="tf-feedback" class="mt-4 text-center font-semibold"></div>
                        
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-sm text-gray-600">Score: ${part3Score.correct}/${step.parts.part3.questions.length}</span>
                            <button id="next-tf" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold shadow-md hover:bg-blue-700 transition-colors ${isAttempted ? '' : 'hidden'}">
                                Next Question
                            </button>
                        </div>
                    </div>
                </section>
            `;

            const trueBtn = document.getElementById('true-btn');
            const falseBtn = document.getElementById('false-btn');
            const feedbackDiv = document.getElementById('tf-feedback');
            const nextBtn = document.getElementById('next-tf');

            function handleAnswer(userAnswer) {
                if (part3Attempted[currentQuestion]) return;
                
                part3Attempted[currentQuestion] = true;
                const isCorrect = (userAnswer === question.answer);
                
                if (isCorrect) {
                    feedbackDiv.textContent = `Correct! ${question.explanation}`;
                    feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                    part3Score.correct++;
                } else {
                    feedbackDiv.textContent = `Incorrect. ${question.explanation}`;
                    feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                }
                
                trueBtn.disabled = true;
                falseBtn.disabled = true;
                trueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                falseBtn.classList.add('opacity-50', 'cursor-not-allowed');
                nextBtn.classList.remove('hidden');
                
                document.querySelector('span').textContent = `Score: ${part3Score.correct}/${step.parts.part3.questions.length}`;
            }

            trueBtn.onclick = () => handleAnswer(true);
            falseBtn.onclick = () => handleAnswer(false);
            nextBtn.onclick = () => {
                currentQuestion++;
                renderQuestion();
            };
        }

        renderQuestion();
    }

    function checkActivity3Completion() {
        activityScores.activity3.correct = part1Score.correct + part2Score.correct + part3Score.correct;
        activityScores.activity3.total = part1Score.total + part2Score.total + part3Score.total;
        
        if (!correctCodesEntered.activity3) {
            showModal('Activity 3 Complete!', `You completed all three parts! Your code is: <span class="font-bold text-lg">${activityCodes.activity3}</span>.`);
            correctCodesEntered.activity3 = true;
            enteredCodes.activity3 = activityCodes.activity3;
            updateCodeInputStates();
            saveState();
            nextButton.classList.remove('hidden');
        }
    }

    // Start with part 1
    renderPart1();
}
        
        function renderConclusionStep(step) {

                <section class="text-center">
                    <h2 class="text-4xl font-bold text-gray-800">${step.title}</h2>
                    <p class="text-xl text-gray-600 mt-2">${step.subtitle}</p>
                    <div class="mt-4 text-left p-6 bg-yellow-50 rounded-lg shadow-inner">
                        ${step.content}
                    </div>
                    <button id="view-chart-button" class="mt-6 px-8 py-4 bg-green-500 text-white rounded-lg font-semibold shadow-md hover:bg-green-600 transition-colors transform hover:scale-105">View Patient Charts</button>
                </section>
            `;
            backButton.classList.add('hidden');
            nextButton.classList.add('hidden');

            document.getElementById('view-chart-button').onclick = () => {
                inPatientChart = true;

        function renderPatientChart(step) {

                <section class="flex flex-col gap-4">

                        ${step.content}
                    </div>
                </section>
            `;

            nextButton.classList.remove('hidden');
            
            // Add event listener for the next patient button
            if (step.type === 'final-congrats') {
                document.getElementById('next-patient-button').onclick = () => {
                    inSecondPatient = true;
                    currentSecondPatientStep = 0;
                    saveState();
                    renderStep();
                };
            }
            
            if (step.type === 'decision-point-1' || step.type === 'decision-point-2') {
                // No specific logic for these, they just display info
            } else if (step.type === 'decision-point-3') {
                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-decision');
                submitButton.onclick = () => {
                    const selectedOption = document.querySelector('input[name="diagnosis3"]:checked');

                    if (!selectedOption) {
                        showModal('Please make a selection', 'You must choose an option to proceed.');

                    }

                    if (selectedOption.value === correctOption) {

                            'b': 'Tyler does have red flag symptoms, though are not categorized as mild using the SNNOOP10 mnemonic tool to identify red flags. Given the progressively worsening nature of Tyler\'s headaches in the presence of neurological symptoms, Tyler should be referred for urgent emergency assessment to rule out the red flag secondary causes for his headaches that we previously identified. Let\'s go back to the question and try again.',
                            'c': 'While Tyler\'s blood pressure is outside the normal range and will need to be further assessed, he has red flag symptoms associated with his headaches and neurological manifestations. Tyler should be referred for urgent emergency assessment to rule out the red flag secondary causes for his headaches that we previously identified. Let\'s go back to the question and try again.'

                        showModal('Incorrect.', feedbackMessages[selectedOption.value] + ' Let\'s go back to the question and try again.');

                };
            }
        }

        function renderSecondPatient(step) {
            contentArea.innerHTML = `
                <section class="flex flex-col gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">${step.title}</h2>
                    <div class="p-6 bg-white rounded-lg shadow-inner">
                        ${step.content}
                    </div>
                </section>
            `;
            backButton.classList.remove('hidden');
            nextButton.classList.remove('hidden');
            
            // Special handling for the first step with approach options
            if (step.type === 'second-patient-intro') {
                const approachOptions = document.querySelectorAll('.approach-option');
                const feedbackDiv = document.getElementById('approach-feedback');
                
                approachOptions.forEach(option => {
                    option.onclick = () => {
                        if (option.dataset.option === 'a') {
                            feedbackDiv.textContent = 'She seems anxious, maybe try again.';
                            feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                            feedbackDiv.classList.remove('hidden');
                        } else if (option.dataset.option === 'b') {
                            feedbackDiv.textContent = 'Good Job! You have created a calming environment and have now gained access to the following information.';
                            feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                            feedbackDiv.classList.remove('hidden');
                            
                            // Enable next button after correct choice
                            setTimeout(() => {
                                currentSecondPatientStep++;
                                saveState();
                                renderStep();
                            }, 1500);
                        }
                    };
                });
            }
            
            // Special handling for the quiz step
            if (step.type === 'second-patient-clinical-info') {
                const submitButton = document.getElementById('submit-quiz');
                const feedbackDiv = document.getElementById('quiz-feedback');
                
                submitButton.onclick = () => {
                    const answers = {
                        q1: document.querySelector('input[name="q1"]:checked'),
                        q2: document.querySelector('input[name="q2"]:checked'),
                        q3: document.querySelector('input[name="q3"]:checked'),
                        q4: document.querySelector('input[name="q4"]:checked'),
                        q5: document.querySelector('input[name="q5"]:checked')
                    };
                    
                    // Check if all questions are answered
                    if (Object.values(answers).some(answer => !answer)) {
                        showModal('Incomplete', 'Please answer all questions before submitting.');
                        return;
                    }
                    
                    // Correct answers
                    const correctAnswers = {
                        q1: 'A',
                        q2: 'B',
                        q3: 'B',
                        q4: 'D',
                        q5: 'D'
                    };
                    
                    // Check answers
                    let correctCount = 0;
                    Object.keys(answers).forEach(question => {
                        if (answers[question].value === correctAnswers[question]) {
                            correctCount++;
                        }
                    });
                    
                    if (correctCount === 5) {
                        feedbackDiv.textContent = 'Excellent! All answers are correct.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                        feedbackDiv.classList.remove('hidden');
                        
                        // Enable next button after correct answers
                        setTimeout(() => {
                            currentSecondPatientStep++;
                            saveState();
                            renderStep();
                        }, 1500);
                    } else {
                        feedbackDiv.textContent = `You got ${correctCount} out of 5 correct. Please review the video and try again.`;
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                        feedbackDiv.classList.remove('hidden');
                    }
                };
            }

            // NEW PAGES HANDLING
            if (step.type === 'hannah-decision-point-1') {
                // No validation needed - proceed regardless of selection
                const feedbackDiv = document.getElementById('hannah-dx-feedback');
                feedbackDiv.textContent = 'Selection recorded. Proceeding to physical assessment...';
                feedbackDiv.className = 'mt-4 text-center font-semibold text-blue-600';
                feedbackDiv.classList.remove('hidden');
                
                // Auto-proceed after a short delay
                setTimeout(() => {
                    currentSecondPatientStep++;
                    saveState();
                    renderStep();
                }, 2000);
            }

            if (step.type === 'hannah-decision-point-2') {
                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-order');
                const orderInput = document.getElementById('order-input');
                const feedbackDiv = document.getElementById('order-feedback');
                
                submitButton.onclick = () => {
                    const userAnswer = orderInput.value.trim();
                    if (userAnswer === '4132') {
                        feedbackDiv.textContent = 'Correct! The order is 4 (Migraine), 1 (Medication overuse), 3 (Tension), 2 (Cluster).';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                        feedbackDiv.classList.remove('hidden');
                        
                        setTimeout(() => {
                            currentSecondPatientStep++;
                            saveState();
                            renderStep();
                        }, 2000);
                    } else {
                        feedbackDiv.textContent = 'Incorrect order. Please try again.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                        feedbackDiv.classList.remove('hidden');
                    }
                };

                // Allow Enter key submission
                orderInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        submitButton.click();
                    }
                });
            }

            // Quiz question handlers
            if (step.type === 'hannah-quiz-1') {
                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-quiz1');
                const feedbackDiv = document.getElementById('quiz1-feedback');
                
                submitButton.onclick = () => {
                    const selectedAnswer = document.querySelector('input[name="quiz1"]:checked');
                    if (!selectedAnswer) {
                        showModal('Please select an answer', 'You must choose an option to proceed.');
                        return;

                    if (selectedAnswer.value === 'A') {
                        feedbackDiv.textContent = 'Correct! This accurately describes the pertinent findings for migraine with aura.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                        feedbackDiv.classList.remove('hidden');
                        
                        setTimeout(() => {
                            currentSecondPatientStep++;
                            saveState();
                            renderStep();
                        }, 2000);
                    } else {
                        feedbackDiv.textContent = 'Incorrect. Please review the case details and try again.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                        feedbackDiv.classList.remove('hidden');
                    }
                };
            }

            if (step.type === 'hannah-quiz-2') {
                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-quiz2');
                const feedbackDiv = document.getElementById('quiz2-feedback');
                
                submitButton.onclick = () => {
                    const selectedAnswer = document.querySelector('input[name="quiz2"]:checked');
                    if (!selectedAnswer) {
                        showModal('Please select an answer', 'You must choose an option to proceed.');
                        return;
                    }

                    if (selectedAnswer.value === 'B') {
                        feedbackDiv.textContent = 'Correct! This accurately describes medication overuse headache.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                        feedbackDiv.classList.remove('hidden');
                        
                        setTimeout(() => {
                            currentSecondPatientStep++;
                            saveState();
                            renderStep();

                        feedbackDiv.textContent = 'Incorrect. Please review the case details and try again.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';

                    }
                };
            }

            if (step.type === 'hannah-quiz-3') {
                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-quiz3');
                const feedbackDiv = document.getElementById('quiz3-feedback');
                
                submitButton.onclick = () => {
                    const selectedAnswer = document.querySelector('input[name="quiz3"]:checked');

                        showModal('Please select an answer', 'You must choose an option to proceed.');

                            currentSecondPatientStep++;
                            saveState();
                            renderStep();

                        feedbackDiv.textContent = 'Incorrect. Please review the case details and try again.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';

                nextButton.classList.add('hidden');
                const submitButton = document.getElementById('submit-quiz4');

                submitButton.onclick = () => {
                    const selectedAnswer = document.querySelector('input[name="quiz4"]:checked');
                    if (!selectedAnswer) {
                        showModal('Please select an answer', 'You must choose an option to proceed.');
                        return;
                    }

                    if (selectedAnswer.value === 'D') {
                        feedbackDiv.textContent = 'Correct! This accurately describes cluster headaches.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-green-600';
                        feedbackDiv.classList.remove('hidden');
                        
                        setTimeout(() => {
                            currentSecondPatientStep++;
                            saveState();
                            renderStep();
                        }, 2000);
                    } else {
                        feedbackDiv.textContent = 'Incorrect. Please review the case details and try again.';
                        feedbackDiv.className = 'mt-4 text-center font-semibold text-red-600';
                        feedbackDiv.classList.remove('hidden');
                    }
                };
            }
        }

        function renderScoreboard() {
            const scoreboard = document.querySelector('.scoreboard-container');
            if(scoreboard) {
                scoreboard.innerHTML = updateScoreboard();
            }
        }

        function renderStep() {
            if (inSecondPatient) {
                const step = secondPatientSteps[currentSecondPatientStep];
                if (step) {
                    renderSecondPatient(step);
                }
            } else if (inPatientChart) {
                const step = patientChartSteps[currentChartStep];
                if (step) {
                    renderPatientChart(step);
                }
            } else {
                const step = steps[currentStep];
                updateProgressBar();
                feedbackDiv.classList.add('hidden');
                switch (step.type) {
                    case 'intro':
                        renderIntroStep(step);
                        break;
                    case 'activity1':
                        renderActivity1(step);
                        break;
                    case 'activity2':
                        renderActivity2(step);
                        break;
                    case 'activity3':
                        renderActivity3(step);
                        break;
                    case 'conclusion':
                        renderConclusionStep(step);
                        break;
                }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event Listeners
        nextButton.onclick = () => {
            if (inSecondPatient) {
                currentSecondPatientStep++;
            } else if (inPatientChart) {
                currentChartStep++;
            } else {
                currentStep++;
            }
            saveState();
            renderStep();
        };

        backButton.onclick = () => {
            if (inSecondPatient) {
                currentSecondPatientStep--;
                if (currentSecondPatientStep < 0) {
                    inSecondPatient = false;
                    currentChartStep = patientChartSteps.length - 1;
                }
            } else if (inPatientChart) {
                currentChartStep--;
                if (currentChartStep < 0) {
                    inPatientChart = false;
                    currentStep = steps.findIndex(s => s.type === 'conclusion');
                }
            } else {
                currentStep--;
            }
            saveState();
            renderStep();
        };

        codePanelToggle.onclick = () => {
            codePanel.classList.toggle('open');
            mainContainer.classList.toggle('transform');
        };

        // Initialize
        renderStep();
        updateCodeInputStates();
        updateProgressBar();
        timerDisplay.textContent = `Time Elapsed: ${formatTime(mainTimeElapsed)}`;
        if (Object.values(correctCodesEntered).every(Boolean)) {
            clearInterval(mainTimerInterval);
        } else if (currentStep > 0) {
            startMainTimer();
        }
    </script>
